# muse-spark-1-1__system_card
# Source: Muse Spark 1.1 Evaluation Report (Meta Superintelligence Labs, Jul 9, 2026), 112pp PDF
#   https://ai.meta.com/static-resource/muse-spark-1-1-evaluation-report
# Safety/preparedness report (Advanced AI Scaling Framework). Values from Table 1 (capabilities
# related to catastrophic risk) and Table 2 (propensities/refusals/robustness/behavior), Muse Spark
# 1.1 = column 1 of [1.1 | 1.0 | GPT-5.5 | Opus 4.8 | Gemini 3.1 Pro], read via pdftotext -layout.
# The general-capability comparison table (report Figure 44) is the SAME data as the blog's model-card
# table -> recorded in the blog extraction (not duplicated here) to mirror the Muse Spark 1.0 split.
# metric direction varies (some ASR/refusal/propensity where lower is safer) -> captured in model_config.

# gpt-5-6__system_card
# Source: https://deploymentsafety.openai.com/gpt-5-6/gpt-5-6.pdf  (GPT-5.6 System Card, GA, 2026-07-09)
# Family members tracked as SEPARATE models via per-mention `model:` (GPT-5.6 Sol / Terra / Luna).
# The system card does NOT test "ultra" mode -> NO Sol Ultra here (Ultra appears only in the blog).
# Health + CTF + refusal/safety-training tables give all three tiers -> one mention per tier.
# Most Preparedness evals state only the leading tier in text (figures show all three) -> that tier
# is tagged; figure-only values stay score_pending (no invented numbers), attributed to Sol (lead)
# with a note that all tiers were run. Internal safety evals (disallowed-content, vision, jailbreaks,
# prompt-injection, mental-health, fairness, destructive-actions, computer-use) are NOT recorded,
# per prior OpenAI system-card extractions.

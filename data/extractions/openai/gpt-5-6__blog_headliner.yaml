# gpt-5-6__blog_headliner
# Source: https://openai.com/index/gpt-5-6/ (GPT-5.6 GA launch blog, 2026-07-09)
# PROVENANCE: GA blog is JS/Cloudflare-gated (not machine-fetchable); values human-transcribed
# from the live blog's model-card comparison TABLE (columns: Sol | Sol Ultra | Terra | Luna).
# Family members Sol / Terra / Luna are tracked as SEPARATE models via a per-mention `model:` override.
# 'Ultra' runs are folded into GPT-5.6 Sol as a config annotation (NOT a separate model).
# Weight: doc default = model_card (2). The benchmarks OpenAI also HEADLINES (per operator) are
# marked weight_class: blog_headliner (3) on the Sol tier (and on Sol Ultra for the multi-agent
# trio Terminal-Bench / BrowseComp / SEC-Bench Pro). OpenAI's headliners use the SAME score as the
# model card, so the headliner value == the table value. Sol Ultra only exists where the table has
# an Ultra column value (3 rows). '--' Ultra columns => no Sol Ultra mention for that row.

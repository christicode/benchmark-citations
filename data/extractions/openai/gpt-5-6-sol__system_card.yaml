# gpt-5-6-sol__system_card
# Source: https://deploymentsafety.openai.com/gpt-5-6/gpt-5-6.pdf
#   GPT-5.6 System Card (GA rollout, 2026-07-09). Covers the whole family: Sol (flagship),
#   Terra (lower-cost), Luna (fastest). Supersedes the 2026-06-26 preview card.
# Safety/Preparedness-focused card. Health is a text table (exact Sol/Terra/Luna values).
# Most capability numbers live in figures (images) with only baselines/thresholds stated in
# prose -> those are score_pending (no invented values), matching the GPT-5.4/5.5 cards.
# Per-tier values are captured in model_config (primary = the tier the card leads with);
# other tiers + thresholds/baselines go in methodology. Internal-only safety evals (Production
# Benchmarks / Vision / jailbreaks / prompt-injection / mental-health / first-person fairness /
# destructive-actions / computer-use confirmations) are NOT recorded, consistent with prior
# OpenAI system-card extractions.
doc: gpt-5-6-sol__system_card

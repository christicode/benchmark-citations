# kimi-k3__model_card
# Source: https://www.kimi.com/blog/kimi-k3  ("Kimi K3: Open Frontier Intelligence", Moonshot AI).
#   Human-promoted 2026-07-16. Kimi K3 = first open 3T-class model (2.8T params, KDA+AttnRes,
#   native vision, 1M context). Weights to be released by 2026-07-27; blog is the release headliner.
# WEIGHT CLASS: scores come from the single "Full Benchmark Table" (a multi-benchmark comparison
#   table) => model_card (doc default). The blog's prose "headliner" sections (kernel optimization,
#   GPU compiler / MiniTriton, game dev, chip design, coding-for-research, knowledge-work cases) are
#   qualitative demos with NO numbers of their own. BUT the blog ALSO carries dedicated per-benchmark
#   HEADLINER CHART images whose values duplicate the table. Human-reviewed 2026-07-16 (charts read
#   off-thread): the 14 benchmarks below carry `weight_class: blog_headliner` (3) reusing the table
#   score; every other row stays model_card (2). Since build.py takes MAX weight per (doc, model,
#   benchmark), marking one config-split (CharXiv/ZeroBench = the w/tool i.e. 'with python' chart)
#   is enough to lift that benchmark to headliner. Headliner set (per human): GDPval-AA v2, AA-Briefcase,
#   Automation Bench, Job Bench, SpreadsheetBench 2, BrowseComp, DeepSWE, FrontierSWE, Kimi Code
#   Bench 2.0, Program Bench, Terminal Bench 2.1, SWE Marathon, CharXiv (RQ) w/python, ZeroBench_main w/python.
# CITING MODEL = Kimi K3 (max). Confirmed COLUMN 1 of 6. Competitor columns (captured verbatim in
#   methodology, in this order): Claude Fable 5 (max, w/ fallback) / GPT-5.6 Sol (max) /
#   Claude Opus 4.8 (max) / GPT-5.5 (xhigh) / GLM-5.2 (max). '*' on a competitor cell = harness-
#   adjusted per the blog footnotes; Kimi K3's own column carries no '*'.
# GLOBAL CONFIG (footnote): all K3 results at reasoning effort 'max', temperature=1.0, top-p=1.0.
#   Per-benchmark agentic harness (KimiCode / Claude Code / Codex) recorded from the footnotes.
# Config splits (w/ tools, w/ python, pass@k) are recorded as SEPARATE mentions of the SAME
#   canonical with a distinguishing model_config (build.py takes MAX weight per doc, so no double-count).
# TENTATIVE identity calls (flagged in registry notes): 'SpreadsheetBench 2' folded into
#   spreadsheetbench as a version bump; DECK-Bench/PerceptionBench/AA-Briefcase are NEW canonicals.

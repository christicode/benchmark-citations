# aliases.yaml — CURATED BENCHMARK ALIAS REGISTRY
# Normalization is DETERMINISTIC (exact alias lookup), NOT fuzzy matching.
# Anything not matching a known alias at extraction time is flagged for human
# review (needs_review) and NEVER silently guessed.
#
# harbor_status values:
#   confirmed      = verified this canonical == a Harbor (name,version) entry
#   needs_review   = auto substring-matched a Harbor name but variant/version unconfirmed
#   false_positive = auto-matcher hit a Harbor name that is NOT actually the same benchmark
#   not_in_harbor  = no Harbor entry found
# axis: agentic | static | safety  (SEPARATE axis — not folded into priority score)

schema_version: 1
harbor_registry_ref:
  repo: harbor-framework/harbor
  path: registry.json
  branch: main
  note: "Fetched LIVE each run from raw.githubusercontent main; never cached in-repo. Dedupe by (name,version)."

benchmarks:
  - canonical: swe-bench-verified
    axis: agentic
    aliases: ["SWE-bench Verified", "SWE-Bench Verified", "SWE-bench verified", "SWEbench Verified"]
    harbor_status: confirmed
    harbor_match: {name: swebench-verified}
    method_fields: [scaffold, n_samples, harness, trials_averaged]
    method_note: "Anthropic: bash + string-replace file edit scaffold. OpenAI GPT-5: n=500. Not cross-lab comparable without scaffold/n."

  - canonical: swe-bench-pro
    axis: agentic
    aliases: ["SWE-bench Pro", "SWE-Bench Pro", "SWE-Pro"]
    harbor_status: confirmed
    harbor_match: {name: swebenchpro}

  - canonical: swe-bench-multilingual
    axis: agentic
    aliases: ["SWE-bench Multilingual", "SWE-Multilingual"]
    harbor_status: confirmed
    harbor_match: {name: swebench_multilingual}

  - canonical: terminal-bench
    axis: agentic
    aliases: ["Terminal-Bench", "Terminal Bench", "Terminal-Bench 2.0", "Terminal-Bench 2.1", "Terminal Bench 2.0-Terminus"]
    harbor_status: needs_review
    harbor_match: {name: terminal-bench, also: [terminal-bench-pro, terminal-bench-sample]}
    method_fields: [harness]   # Terminus 1 vs Terminus 2 vs Claude Code vs RooCode
    review_reason: "Version 2.0/2.1 vs Harbor terminal-bench/-pro unconfirmed. Harness materially changes score."

  - canonical: arc-agi-2
    axis: static
    aliases: ["ARC-AGI-2", "ARC AGI 2", "ARC-AGI-2 (Verified)"]
    harbor_status: confirmed
    harbor_match: {name: arc_agi_2}
    method_fields: [effort, thinking_tokens, verifier]  # ARC Prize Foundation semi-private/verified

  - canonical: arc-agi-1
    axis: static
    aliases: ["ARC-AGI-1", "ARC AGI 1"]
    harbor_status: not_in_harbor

  - canonical: gpqa-diamond
    axis: static
    aliases: ["GPQA Diamond", "GPQA-Diamond", "GPQA diamond"]
    harbor_status: confirmed
    harbor_match: {name: gpqa-diamond}

  - canonical: humanitys-last-exam
    axis: static
    aliases: ["Humanity's Last Exam", "HLE", "Humanity\u2019s Last Exam"]
    harbor_status: not_in_harbor
    method_fields: [with_tools, grader_model, contamination_filter]
    method_note: "with-tools vs no-tools split; grader-model restatements common (e.g. Sonnet 4.6 HLE restated 34.6->46.8)."

  - canonical: gdpval-aa
    axis: agentic
    aliases: ["GDPval-AA", "GDPval-AA v2", "GDPval AA"]
    harbor_status: not_in_harbor
    method_fields: [version, elo_or_accuracy, evaluator]  # Artificial Analysis; 220 tasks from OpenAI GDPval gold
    method_note: "Distinct from OpenAI's underlying GDPval gold dataset. v1 vs v2 versions."

  - canonical: osworld
    axis: agentic
    aliases: ["OSWorld", "OSWorld-Verified"]
    harbor_status: not_in_harbor
    review_reason: "OSWorld vs OSWorld-Verified used interchangeably but restated separately — confirm if one benchmark."

  - canonical: browsecomp
    axis: agentic
    aliases: ["BrowseComp", "BrowseComp (Agent Swarm)"]
    harbor_status: not_in_harbor
    method_fields: [multi_agent, tokens, contamination_blocklist]

  - canonical: tau2-bench
    axis: agentic
    aliases: ["tau2-bench", "\u03c42-bench", "\u03c4\u00b2-Bench", "Tau2-Bench", "tau2-bench telecom"]
    harbor_status: not_in_harbor
    method_fields: [domain]   # Airline / Retail / Telecom; user-agent simulator choice

  - canonical: mcp-atlas
    axis: agentic
    aliases: ["MCP-Atlas", "MCP Atlas"]
    harbor_status: not_in_harbor
    method_fields: [effort, provider]  # e.g. Scale AI April-2026 update

  - canonical: mcp-mark-verified
    axis: agentic
    aliases: ["MCP Mark Verified"]
    harbor_status: not_in_harbor

  - canonical: healthbench
    axis: static
    aliases: ["HealthBench", "HealthBench Hard", "HealthBench Professional", "HealthBench Consensus"]
    harbor_status: not_in_harbor
    method_fields: [subset, length_adjusted]

  - canonical: cybench
    axis: agentic
    aliases: ["Cybench", "CyBench"]
    harbor_status: false_positive
    harbor_match: {name: legacy-bench, verdict: "NOT the same benchmark — substring collision on 'bench'"}
    method_fields: [challenges_subset]  # 37/40 vs full 40 — not comparable
    review_reason: "Auto-matcher hit legacy-bench in error. Treat as not_in_harbor pending human confirm."

  - canonical: vending-bench-2
    axis: agentic
    aliases: ["Vending-Bench 2", "Vending Bench 2"]
    harbor_status: not_in_harbor
    method_note: "Andon Labs; long-horizon business sim."

  - canonical: matharena-apex
    axis: static
    aliases: ["MathArena Apex", "APEX", "Apex reasoning"]
    harbor_status: not_in_harbor

  - canonical: mmmu-pro
    axis: static
    aliases: ["MMMU-Pro", "MMMU Pro"]
    harbor_status: not_in_harbor

  - canonical: livecodebench
    axis: agentic
    aliases: ["LiveCodeBench", "LiveCodeBench Pro"]
    harbor_status: needs_review
    harbor_match: {name: livecodebench}
    review_reason: "LiveCodeBench Pro is a distinct harder variant; base livecodebench in Harbor. Confirm split."

  - canonical: simpleqa
    axis: static
    aliases: ["SimpleQA", "SimpleQA Verified"]
    harbor_status: needs_review
    harbor_match: {name: simpleqa}
    review_reason: "SimpleQA Verified (Google) vs base simpleqa — confirm which Harbor holds."

  - canonical: aime
    axis: static
    aliases: ["AIME", "AIME 2025", "AIME 25", "AIME 2026"]
    harbor_status: needs_review
    harbor_match: {name: aime}
    review_reason: "Year/version matters (2025 vs 2026). Confirm Harbor aime version."

  - canonical: bfcl
    axis: agentic
    aliases: ["BFCL", "BFCL-V4", "BFCL V4"]
    harbor_status: needs_review
    harbor_match: {name: bfcl, also: [bfcl_parity]}
    review_reason: "V4 vs Harbor bfcl/bfcl_parity version unconfirmed."

  - canonical: spreadsheetbench
    axis: agentic
    aliases: ["SpreadSheetBench", "SpreadSheetBench-v1"]
    harbor_status: needs_review
    harbor_match: {name: spreadsheetbench-verified}
    review_reason: "Cited 'SpreadSheetBench' vs Harbor '-verified' variant — confirm."

  - canonical: lab-bench
    axis: safety
    aliases: ["LAB-Bench", "LAB-Bench: ProtocolQA", "LAB-Bench: SeqQA"]
    harbor_status: confirmed
    harbor_match: {name: labbench}
    method_fields: [subtask]  # ProtocolQA / SeqQA

  # --- Safety / preparedness cluster (mostly not in Harbor) ---
  - canonical: cybergym
    axis: agentic
    aliases: ["CyberGym"]
    harbor_status: not_in_harbor
  - canonical: cve-bench
    axis: agentic
    aliases: ["CVE-Bench"]
    harbor_status: not_in_harbor
    method_fields: [version, subset]  # v1.0, 34/40 ported
  - canonical: wmdp
    axis: safety
    aliases: ["WMDP-Bio", "WMDP-Chem", "WMDP"]
    harbor_status: not_in_harbor
  - canonical: or-bench
    axis: safety
    aliases: ["OR-Bench"]
    harbor_status: not_in_harbor
  - canonical: agentharm
    axis: safety
    aliases: ["AgentHarm"]
    harbor_status: not_in_harbor
  - canonical: bbq
    axis: safety
    aliases: ["BBQ", "Bias Benchmark for Question Answering"]
    harbor_status: not_in_harbor

  # --- Vendor/proprietary benchmarks (low Harbor-conversion priority; track but flag) ---
  - canonical: vibench
    axis: agentic
    aliases: ["ViBench"]
    harbor_status: not_in_harbor
    vendor_proprietary: true   # Anthropic-internal vibe-coding
  - canonical: cursorbench
    axis: agentic
    aliases: ["CursorBench"]
    harbor_status: not_in_harbor
    vendor_proprietary: true
  - canonical: frontiercode
    axis: agentic
    aliases: ["FrontierCode", "Cognition FrontierCode"]
    harbor_status: not_in_harbor
    vendor_proprietary: true

# Collisions surfaced by the first-pass matcher — ALL require human sign-off
# before harbor_status flips to confirmed. Documented so nothing is silently guessed.
review_flags:
  - cybench_vs_legacy_bench: "FALSE POSITIVE — do not merge."
  - terminal_bench_version: "2.0/2.1 vs terminal-bench / terminal-bench-pro."
  - livecodebench_pro_split: "Pro vs base."
  - simpleqa_verified_split: "Verified vs base."
  - aime_year: "2025 vs 2026 vs Harbor aime."
  - bfcl_v4: "V4 vs bfcl / bfcl_parity."
  - spreadsheetbench_variant: "cited base vs Harbor -verified."
  - osworld_verified_identity: "OSWorld vs OSWorld-Verified same-benchmark?"

  - canonical: aime
    axis: static
    aliases: ["AIME", "AIME 2025", "AIME 25", "AIME 2026"]
    harbor_status: needs_review
    harbor_match: {name: aime, adapter: aime, in_registry: true, type: adapter}
    review_reason: "Harbor aime = 2024 + 2025-I + 2025-II. Cited 'AIME 2026' is NOT covered."

  - canonical: bfcl
    axis: agentic
    aliases: ["BFCL", "BFCL-V4", "BFCL V4"]
    harbor_status: needs_review
    harbor_match: {name: bfcl, adapter: bfcl, in_registry: true, type: adapter, also: [bfcl_parity]}

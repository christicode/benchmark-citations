    harbor_match: {name: spreadsheetbench-verified, adapter: spreadsheetbench-verified, in_registry: true, type: adapter}
    method_note: "RESOLVED: cited 'SpreadSheetBench' == Harbor spreadsheetbench-verified (verified_400 split + 11 correctness fixes). Same benchmark."

  - canonical: lab-bench

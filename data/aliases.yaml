# aliases.yaml — CURATED BENCHMARK ALIAS REGISTRY
# Normalization is DETERMINISTIC (exact alias lookup), NOT fuzzy matching.
# Anything not matching a known alias at extraction time is flagged for human
# review (needs_review) and NEVER silently guessed.
#
# harbor_status values:
#   confirmed      = verified this canonical == a Harbor (name,version) entry OR a merged adapter
#   needs_review   = auto substring-matched a Harbor name but variant/version unconfirmed
#   false_positive = auto-matcher hit a Harbor name that is NOT actually the same benchmark
#   not_in_harbor  = no Harbor entry found
# axis: agentic | static | safety  (SEPARATE axis — not folded into priority score)
# harbor_match may carry: name (registry/adapter), adapter (adapters/ dir), in_registry (bool), type (native|fork|adapter)

schema_version: 1
harbor_registry_ref:
  repo: harbor-framework/harbor
  path: registry.json
  branch: main
  note: "Fetched LIVE each run from raw.githubusercontent main; never cached in-repo. Dedupe by (name,version). The adapters/ folder is a SEPARATE source (adapter can be merged but not yet in registry)."

benchmarks:
  - canonical: swe-bench-verified
    axis: agentic
    aliases: ["SWE-bench Verified", "SWE-Bench Verified", "SWE-bench verified", "SWEbench Verified"]
    harbor_status: confirmed
    harbor_match: {name: swebench-verified, adapter: swebench, in_registry: true, type: adapter}
    method_fields: [scaffold, n_samples, harness, trials_averaged]
    method_note: "Anthropic: bash + string-replace file edit scaffold. OpenAI GPT-5: n=500. Not cross-lab comparable without scaffold/n."

  - canonical: swe-bench-pro
    axis: agentic
    aliases: ["SWE-bench Pro", "SWE-Bench Pro", "SWE-Pro"]
    harbor_status: confirmed
    harbor_match: {name: swebenchpro, adapter: swebenchpro, in_registry: true, type: adapter}

  - canonical: swe-bench-multilingual
    axis: agentic
    aliases: ["SWE-bench Multilingual", "SWE-Multilingual"]
    harbor_status: confirmed
    harbor_match: {name: swebench_multilingual, adapter: swebench_multilingual, in_registry: true, type: adapter}

  - canonical: terminal-bench
    axis: agentic
    aliases: ["Terminal-Bench", "Terminal Bench", "Terminal-Bench 2.0", "Terminal-Bench 2.1", "Terminal Bench 2.0-Terminus"]
    harbor_status: needs_review
    harbor_match: {name: terminal-bench, in_registry: true, type: native, also: [terminal-bench-pro, terminal-bench-sample]}
    method_fields: [harness]   # Terminus 1 vs Terminus 2 vs Claude Code vs RooCode
    review_reason: "NATIVE: Harbor is TB2.0's official harness. registry holds terminal-bench@2.0 ONLY; cited 'Terminal-Bench 2.1' is a DIFFERENT version. Harness materially changes score."

  - canonical: arc-agi-2
    axis: static
    aliases: ["ARC-AGI-2", "ARC AGI 2", "ARC-AGI-2 (Verified)"]
    harbor_status: confirmed
    harbor_match: {name: arc_agi_2, adapter: arc_agi_2, in_registry: true, type: adapter}
    method_fields: [effort, thinking_tokens, verifier]  # ARC Prize Foundation semi-private/verified

  - canonical: arc-agi-1
    axis: static
    aliases: ["ARC-AGI-1", "ARC AGI 1"]
    harbor_status: not_in_harbor
    method_note: "Only arc_agi_2 is in Harbor; ARC-AGI-1 is a different, earlier benchmark."

  - canonical: gpqa-diamond
    axis: static
    aliases: ["GPQA Diamond", "GPQA-Diamond", "GPQA diamond"]
    harbor_status: confirmed
    harbor_match: {name: gpqa-diamond, adapter: gpqa-diamond, in_registry: true, type: adapter}

  - canonical: humanitys-last-exam
    axis: static
    aliases: ["Humanity's Last Exam", "HLE", "Humanity’s Last Exam"]
    harbor_status: confirmed
    harbor_match: {name: hle, adapter: hle, in_registry: false, type: adapter}
    method_fields: [with_tools, grader_model, contamination_filter]
    method_note: "Harbor ADAPTER merged + parity-validated (adapters/hle) but NOT yet in registry.json (registry-only check mislabeled it not_in_harbor). with-tools vs no-tools split; grader-model restatements common (e.g. Sonnet 4.6 HLE restated 34.6->46.8)."

  - canonical: gdpval-aa
    axis: agentic
    aliases: ["GDPval-AA", "GDPval-AA v2", "GDPval AA"]
    harbor_status: not_in_harbor
    method_fields: [version, elo_or_accuracy, evaluator]  # Artificial Analysis; 220 tasks from OpenAI GDPval gold
    method_note: "Distinct from OpenAI's GDPval gold (gdpval-gold). v1 vs v2 versions."

  - canonical: osworld
    axis: agentic
    aliases: ["OSWorld", "OSWorld-Verified"]
    harbor_status: confirmed
    harbor_match: {name: osworld-verified, adapter: osworld, in_registry: false, type: adapter}
    method_note: "RESOLVED: Harbor adapters/osworld targets the OSWorld-Verified no-Google-Drive 361-task split (full parity run merged); adapter NOT yet in registry.json."

  - canonical: browsecomp

# Collisions surfaced by the first-pass matcher — ALL require human sign-off
# before harbor_status flips to confirmed. Documented so nothing is silently guessed.
review_flags:
  - cybench_vs_legacy_bench: "FALSE POSITIVE — do not merge."
  - terminal_bench_version: "NATIVE @2.0; cited 2.1 is a different version. terminal-bench-pro (alibaba) is separate."
  - livecodebench_pro_split: "base v6 in Harbor; 'Pro' is a different, harder benchmark (not in Harbor)."
  - simpleqa_verified_split: "Harbor holds base OpenAI SimpleQA; 'SimpleQA Verified' (Google) is different."
  - aime_year: "Harbor aime = 2024/2025; 'AIME 2026' not covered."
  - bfcl_v4: "V4 vs bfcl / bfcl_parity."
  - spreadsheetbench_variant: "RESOLVED 2026-07 — cited base == Harbor spreadsheetbench-verified (verified_400 + fixes)."
  - osworld_verified_identity: "RESOLVED 2026-07 — Harbor adapter targets OSWorld-Verified no-GDrive 361 split; same benchmark."
  - apex_agents_vs_matharena_apex: "APEX-Agents (apex-agents) != MathArena APEX (matharena-apex) — do not merge."
  - frontierbench_vs_frontiercode: "FrontierBench (frontierbench) != FrontierCode (frontiercode)."
  - gdpval_gold_vs_aa: "GDPval gold win-rate (gdpval-gold) != gdpval-aa (Artificial Analysis)."
  - adapter_not_in_registry: "hle/osworld/cybergym/scicode/aa-lcr/widesearch have MERGED adapters but are not in registry.json — Harbor-compatible, registry-packaging pending."

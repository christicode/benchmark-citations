name: regenerate
on:
  workflow_dispatch:
jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_citations.py
      - name: Commit regenerated data
        run: |
          git config user.name "regen-bot"
          git config user.email "regen-bot@users.noreply.github.com"
          git add data/citations.jsonl
          git commit -m "regen: citations.jsonl from build_citations.py [skip ci]" || echo "no changes"
          git push

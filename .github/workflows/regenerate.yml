name: regenerate
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # regenerate when the pipeline code OR the flat-file source data changes
      - scripts/**.py
      - data/registry.yaml
      - data/documents.yaml
      - data/extractions/**
      - .github/workflows/regenerate.yml
concurrency:
  group: regenerate
  cancel-in-progress: false
jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Build citations.jsonl from the flat-file inputs
        run: python scripts/build.py
      - name: Sync Harbor status from live registry + adapters (no hand-curation)
        run: python scripts/sync_harbor.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Refresh the model axis registry (data/models.yaml) from citations
        run: python scripts/gen_models.py
      - name: Regenerate heatmap landing page (docs/index.html)
        run: python scripts/build_heatmap.py
      - name: Reconciliation invariant (guards the citation↔Harbor join / the (H) marks)
        run: python scripts/check_reconciliation.py
      - name: Commit regenerated data + heatmap (race-safe)
        run: |
          git config user.name "regen-bot"
          git config user.email "regen-bot@users.noreply.github.com"
          git add -A data docs
          git commit -m "regen: citations.jsonl + models.yaml + heatmap" || { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git push

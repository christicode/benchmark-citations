name: regenerate
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/build_citations.py
      - scripts/gen_aliases.py
      - scripts/build_dashboard.py
      - scripts/check_reconciliation.py
      - .github/workflows/regenerate.yml
concurrency:
  group: regenerate
  cancel-in-progress: false
jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/build_citations.py
      - run: python scripts/gen_aliases.py
      - run: python scripts/build_dashboard.py
      - name: Reconciliation invariant (block a split coverage matrix from deploying)
        run: python scripts/check_reconciliation.py
      - name: Commit regenerated data + dashboard (race-safe)
        run: |
          git config user.name "regen-bot"
          git config user.email "regen-bot@users.noreply.github.com"
          git add data/citations.jsonl data/aliases_generated.yaml docs/index.html docs/coverage.html
          git commit -m "regen: citations.jsonl + aliases_generated.yaml + dashboard" || { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git push

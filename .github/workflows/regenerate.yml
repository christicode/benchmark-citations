name: regenerate
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/build_citations.py
      - scripts/gen_aliases.py
      - .github/workflows/regenerate.yml
concurrency:
  group: regenerate
  cancel-in-progress: false
jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_citations.py
      - run: python scripts/gen_aliases.py
      - name: Commit regenerated data (race-safe)
        run: |
          git config user.name "regen-bot"
          git config user.email "regen-bot@users.noreply.github.com"
          git add data/citations.jsonl data/aliases_generated.yaml
          git commit -m "regen: citations.jsonl + aliases_generated.yaml [skip ci]" || { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git push

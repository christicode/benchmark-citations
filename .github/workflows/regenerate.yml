name: regenerate
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # regenerate when the pipeline code OR the flat-file source data changes
      - scripts/**.py
      - data/registry.yaml
      - data/documents.yaml
      - data/extractions/**
      - .github/workflows/regenerate.yml
concurrency:
  group: regenerate
  cancel-in-progress: false
jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Build citations.jsonl from the flat-file inputs
        run: python scripts/build.py
      - name: Sync Harbor status from live registry + adapters (no hand-curation)
        run: python scripts/sync_harbor.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Regenerate dashboard (best-effort; out of the data critical path)
        continue-on-error: true
        run: python scripts/build_dashboard.py
      - name: Reconciliation invariant (block a split coverage matrix from deploying)
        run: python scripts/check_reconciliation.py
      - name: Commit regenerated data + dashboard (race-safe)
        run: |
          git config user.name "regen-bot"
          git config user.email "regen-bot@users.noreply.github.com"
          git add -A data docs
          git commit -m "regen: citations.jsonl + dashboard" || { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git push

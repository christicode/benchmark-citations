name: bootstrap
# ONE-TIME: regenerate the flat-file data layer (registry/documents/extractions) server-side
# from the old committed citations.jsonl + aliases.yaml. Delete this workflow + scripts/_bootstrap.py
# after it runs once.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/_bootstrap.py
      - .github/workflows/bootstrap.yml
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/_bootstrap.py
      - name: Commit generated data layer
        run: |
          git config user.name "bootstrap-bot"
          git config user.email "bootstrap-bot@users.noreply.github.com"
          git add data/registry.yaml data/documents.yaml data/extractions
          git commit -m "bootstrap: generate registry.yaml + documents.yaml + extractions/**" || { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git push
